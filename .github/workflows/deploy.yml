name: Deploy Digitable Chat

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  preflight:
    runs-on: ubuntu-latest
    outputs:
      deploy_ready: ${{ steps.check.outputs.deploy_ready }}
    steps:
      - id: check
        env:
          DIGITABLE_HOST: ${{ secrets.DIGITABLE_HOST }}
          DIGITABLE_USERNAME: ${{ secrets.DIGITABLE_USERNAME }}
          DIGITABLE_SSH_KEY: ${{ secrets.DIGITABLE_SSH_KEY }}
        run: |
          if [ -n "$DIGITABLE_HOST" ] && [ -n "$DIGITABLE_USERNAME" ] && [ -n "$DIGITABLE_SSH_KEY" ]; then
            echo "deploy_ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "deploy_ready=false" >> "$GITHUB_OUTPUT"
            echo "Deployment skipped: DIGITABLE_HOST, DIGITABLE_USERNAME, or DIGITABLE_SSH_KEY is not configured."
          fi

  deploy:
    needs: preflight
    if: needs.preflight.outputs.deploy_ready == 'true'
    runs-on: ubuntu-latest
    environment: production
    env:
      VITE_GITHUB_REPO: https://github.com/digitable-lol/chat
      VITE_ICE_SERVERS_URL: ${{ secrets.DIGITABLE_CHAT_ICE_SERVERS_URL }}
      VITE_SIGNALING_RELAY_URLS: ${{ vars.SIGNALING_RELAY_URLS }}
      VITE_SIGNALING_RELAY_REDUNDANCY: ${{ vars.SIGNALING_RELAY_REDUNDANCY }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18.12.1
          cache: npm

      - name: Build
        run: |
          npm ci
          npm run build

      - name: Configure SSH
        env:
          DIGITABLE_HOST: ${{ secrets.DIGITABLE_HOST }}
          DIGITABLE_SSH_KEY: ${{ secrets.DIGITABLE_SSH_KEY }}
        run: |
          install -d -m 700 ~/.ssh
          printf '%s\n' "$DIGITABLE_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p 22 "$DIGITABLE_HOST" >> ~/.ssh/known_hosts

      - name: Deploy static assets
        env:
          DIGITABLE_HOST: ${{ secrets.DIGITABLE_HOST }}
          DIGITABLE_USERNAME: ${{ secrets.DIGITABLE_USERNAME }}
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/id_ed25519 -p 22" \
            dist/ \
            "$DIGITABLE_USERNAME@$DIGITABLE_HOST:/www/wwwroot/chat.digitable.life/"

      - name: Verify deployment and reload nginx
        env:
          DIGITABLE_HOST: ${{ secrets.DIGITABLE_HOST }}
          DIGITABLE_USERNAME: ${{ secrets.DIGITABLE_USERNAME }}
        run: |
          ssh -i ~/.ssh/id_ed25519 -p 22 "$DIGITABLE_USERNAME@$DIGITABLE_HOST" \
            "test -f /www/wwwroot/chat.digitable.life/index.html && (sudo -n systemctl reload nginx || sudo -n /etc/init.d/nginx reload || true)"
